services:
  - type: web
    name: encuestas-platform
    runtime: python
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: encuestas-db
          property: connectionString
      - key: ADMIN_KEY
        value: EncuestasIT01
    autoDeploy: true

databases:
  - name: encuestas-db
    plan: free
