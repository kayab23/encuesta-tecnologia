services:
  - type: web
    name: encuestas-platform
    runtime: python
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
    envVars:
      - key: DATABASE_URL
        sync: false   # Se configura manualmente en el dashboard con la URL de Neon
      - key: ADMIN_KEY
        value: EncuestasIT01
    autoDeploy: true
